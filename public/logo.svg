<?xml version="1.0" encoding="utf-8"?>
<svg
    version="1.1"
    xmlns="http://www.w3.org/2000/svg"
    x="0px"
    y="0px"
    viewBox="0 0 24 24"
    style="enable-background:new 0 0 24 24;"
    xml:space="preserve"
>
<defs>
  <style type="text/css">
    .book-icon {
      fill: none;
      stroke: #FFFFFF;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bg {
      fill: #2D2D2D;
      stroke: #FFFFFF;
      stroke-width: 0.6;
    }

    .z-breathe {
      animation: breathe 2.5s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes breathe {
      0%, 100% {
        opacity: 0.7;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
</defs>

<!-- Фон -->
<rect class="bg" x="1" y="1" width="22" height="22" rx="3"/>

<!-- Иконка -->
<g class="z-breathe">
  <path class="book-icon" d="M12 7v14"/>
  <path class="book-icon" d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>
</g>

</svg>