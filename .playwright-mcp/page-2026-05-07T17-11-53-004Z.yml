                    - button [ref=e821] [cursor=pointer]: 📑
                    - paragraph: "Статья предлагает формальную модель межзвёздного поведения технологической цивилизации. Исходная предпосылка минимальна: цивилизация стремится продолжать существовать на больших временах. Из этой цели выводятся инструментальные требования: ей нужны знания для предсказания угроз, распределённость для защиты от локальных катастроф, оборонный потенциал для сопротивления внешним рискам и осторожность, чтобы не стать лёгкой целью для неизвестных агентов."
                  - group:
