                - generic:
                  - article:
                    - button [ref=e822] [cursor=pointer]: 📑
                    - paragraph: "Модель учитывает физические ограничения: конечность энергии и ресурсов, невозможность полной термодинамической невидимости, рост управленческих издержек при больших расстояниях, риск локального вымирания и неизбежные следы агрессивных действий. Эти ограничения показывают, что крайние режимы поведения неустойчивы. Полная изоляция снижает видимость, но повышает риск стагнации и локальной гибели. Систематическая агрессия может устранить отдельные угрозы, но требует энергии, оставляет следы и провоцирует ответ. Открытая кооперация ускоряет рост знания, но делает цивилизацию слишком заметной."
