                    - paragraph: "Внутренним решением становится защищённая кооперация: ограниченный и проверяемый обмен информацией, распределённая инфраструктура, отсутствие систематической превентивной агрессии и минимальная физически достижимая видимость. Такой режим может объяснять Великое Молчание: зрелые цивилизации не обязательно отсутствуют и не обязательно парализованы страхом; они могут быть организованы так, чтобы выживать через скрытую, осторожную и протокольно защищённую кооперацию."
